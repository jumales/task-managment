server:
  port: 0

spring:
  application:
    name: reporting-service
  datasource:
    url: jdbc:postgresql://localhost:5432/reporting_db
    username: reporting_svc
    password: reporting_svc_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: reporting-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/demo}

websocket:
  security:
    path-matcher: /ws/**

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4173}

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/,http://localhost:8762/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,loggers
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.demo.common.web: DEBUG          # controller param tracing + MDC filter
    org.hibernate.SQL: DEBUG            # SQL statements (replaces show-sql: true)
    com.demo.reporting.consumer: DEBUG  # important: app-level event consumption
    org.apache.kafka: WARN
    org.apache.kafka.clients.NetworkClient: ERROR
    org.springframework.kafka.listener: INFO   # DLT routing and retry attempts
    org.springframework.kafka: WARN
    org.hibernate: WARN
