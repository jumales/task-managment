server:
  port: 0

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/notification_db
    username: notification_svc
    password: notification_svc_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  flyway:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.demo.common.event"
        spring.json.value.default.type: "com.demo.common.event.TaskChangedEvent"

  mail:
    host: localhost
    port: 1025
    protocol: smtp
    properties:
      mail.smtp.auth: false
      mail.smtp.starttls.enable: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/demo}
      client:
        registration:
          keycloak:
            client-id: notification-service
            client-secret: ${KEYCLOAK_CLIENT_SECRET:notification-secret}
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8180/realms/demo/protocol/openid-connect/token}

app:
  # Base URL of the frontend — used to build {taskUrl} in notification templates
  frontend-url: http://localhost:3000

notification:
  mail:
    from: noreply@demo.local

feign:
  client:
    config:
      default:
        connect-timeout: 2000   # 2 s — fail fast on connection refused
        read-timeout: 5000      # 5 s — prevent thread starvation on slow responses

resilience4j:
  circuitbreaker:
    instances:
      userService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.demo.common.web: DEBUG
    org.hibernate.SQL: DEBUG
    com.demo.notification.consumer: DEBUG  # important: app-level event consumption
    org.apache.kafka: WARN
    org.apache.kafka.clients.NetworkClient: ERROR
    org.springframework.kafka: WARN
    org.hibernate: WARN
