server:
  port: 8080

cors:
  allowed-origins:
    - "http://localhost:3000"

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      # Deny requests with no resolved rate-limit key (should not happen since all routes require auth)
      filter:
        request-rate-limiter:
          deny-empty-key: false
      routes:
        # Rate-limited: GET /api/v1/users/** — 60 req/min per user to prevent enumeration
        # replenishRate 1/s, requestedTokens 1 → 60/min, burst up to 10
        - id: user-service-users-read
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
            - Method=GET
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 10
                redis-rate-limiter.requestedTokens: 1
                key-resolver: "#{@principalKeyResolver}"

        - id: user-service-users
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**

        - id: user-service-roles
          uri: lb://user-service
          predicates:
            - Path=/api/v1/roles/**

        - id: user-service-rights
          uri: lb://user-service
          predicates:
            - Path=/api/v1/rights/**

        # Rate-limited: POST /api/v1/tasks/{id}/comments — 30 req/min per user
        # Must be declared before the catch-all task route (more specific path wins)
        - id: task-service-comments
          uri: lb://task-service
          predicates:
            - Path=/api/v1/tasks/*/comments
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                # Redis token bucket: ~30 req/min = replenishRate 1/2s, burst 5
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 2
                key-resolver: "#{@principalKeyResolver}"

        - id: task-service-tasks
          uri: lb://task-service
          predicates:
            - Path=/api/v1/tasks/**

        - id: task-service-projects
          uri: lb://task-service
          predicates:
            - Path=/api/v1/projects/**

        - id: task-service-phases
          uri: lb://task-service
          predicates:
            - Path=/api/v1/phases/**

        - id: audit-service-audit
          uri: lb://audit-service
          predicates:
            - Path=/api/v1/audit/**

        # Rate-limited: GET /api/v1/search/** — 30 req/min per user to prevent scraping
        # replenishRate 1/2s, requestedTokens 2 → 30/min, burst up to 5
        - id: search-service-search-read
          uri: lb://search-service
          predicates:
            - Path=/api/v1/search/**
            - Method=GET
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 5
                redis-rate-limiter.requestedTokens: 2
                key-resolver: "#{@principalKeyResolver}"

        - id: search-service-search
          uri: lb://search-service
          predicates:
            - Path=/api/v1/search/**

        # Rate-limited: POST /api/v1/files/* (avatar/attachment upload) — 10 req/min per user
        # replenishRate 1/s, requestedTokens 6 → 1 upload per 6s (~10/min)
        # burstCapacity must be >= requestedTokens so the bucket can ever satisfy a request
        - id: file-service-upload-avatars
          uri: lb://file-service
          predicates:
            - Path=/api/v1/files/avatars
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 6
                redis-rate-limiter.requestedTokens: 6
                key-resolver: "#{@principalKeyResolver}"

        - id: file-service-upload-attachments
          uri: lb://file-service
          predicates:
            - Path=/api/v1/files/attachments
            - Method=POST
          filters:
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 6
                redis-rate-limiter.requestedTokens: 6
                key-resolver: "#{@principalKeyResolver}"

        - id: file-service-files
          uri: lb://file-service
          predicates:
            - Path=/api/v1/files/**

  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak issues tokens for the 'demo' realm; Spring fetches JWKS on startup
          # and validates signatures locally — no round-trip to Keycloak per request.
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/demo}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
