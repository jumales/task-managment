# Logstash pipeline — receives JSON logs from services over TCP and ships them to Elasticsearch.
#
# Services send logs here when running with: spring.profiles.active=logstash
# Each log line is already a JSON object produced by LogstashEncoder (logstash-logback-encoder).

input {
  tcp {
    port => 5000
    codec => json_lines  # one JSON object per line, as produced by LogstashEncoder
  }
}

filter {
  # traceId and spanId are injected by Micrometer Tracing (via MDC) — no parsing needed.
  # requestId, method, path, userId are injected by MdcFilter — also already in the JSON.

  # Normalise the timestamp from Logback's @timestamp field
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    # One index per service per day — easy to manage retention in Kibana
    index => "%{[service]}-%{+YYYY.MM.dd}"
  }
}
