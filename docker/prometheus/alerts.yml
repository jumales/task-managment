groups:
  - name: task-management
    rules:

      # ── Availability ────────────────────────────────────────────────────────

      # Fires when any scraped target has been unreachable for more than 1 minute.
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.application }} is down"
          description: "Instance {{ $labels.instance }} has been unreachable for more than 1 minute."

      # ── HTTP Error Rate ─────────────────────────────────────────────────────

      # Fires when 5xx responses exceed 10% of all requests over a 5-minute window.
      - alert: HighErrorRate
        expr: |
          rate(http_server_requests_seconds_count{status=~"5.."}[5m])
          /
          rate(http_server_requests_seconds_count[5m])
          > 0.10
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.application }}"
          description: "{{ $labels.application }} error rate is {{ $value | humanizePercentage }} over the last 5 minutes."

      # ── Latency ─────────────────────────────────────────────────────────────

      # Fires when the p99 latency exceeds 2 seconds.
      - alert: HighP99Latency
        expr: |
          histogram_quantile(0.99,
            rate(http_server_requests_seconds_bucket[5m])
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p99 latency on {{ $labels.application }}"
          description: "p99 latency for {{ $labels.application }} is {{ $value | humanizeDuration }}."

      # ── JVM Memory ──────────────────────────────────────────────────────────

      # Fires when heap usage exceeds 85% of the configured max.
      - alert: HighHeapUsage
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High heap usage on {{ $labels.application }}"
          description: "{{ $labels.application }} heap is at {{ $value | humanizePercentage }} on {{ $labels.instance }}."

      # ── Database Connections ─────────────────────────────────────────────────

      # Fires when HikariCP connection pool is at or near its maximum.
      - alert: DatabaseConnectionPoolExhausted
        expr: |
          hikaricp_connections_active
          /
          hikaricp_connections_max
          > 0.90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "DB connection pool near exhaustion on {{ $labels.application }}"
          description: "{{ $labels.application }} is using {{ $value | humanizePercentage }} of its HikariCP connection pool."
