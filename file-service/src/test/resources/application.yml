spring:
  cloud:
    config:
      enabled: false
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

minio:
  url: http://localhost:9000
  access-key: minio
  secret-key: minio123
  buckets:
    avatars:
      allowed-types:
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
      max-size-bytes: 5242880
    attachments:
      allowed-types:
        - application/pdf
        - image/jpeg
        - image/png
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - text/plain
        - text/csv
      max-size-bytes: 20971520
