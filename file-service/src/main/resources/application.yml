server:
  port: 0

spring:
  application:
    name: file-service
  datasource:
    url: jdbc:postgresql://localhost:5432/file_db
    username: file_svc
    password: file_svc_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  flyway:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/demo}

  servlet:
    multipart:
      # Set generously high; per-bucket limits below are the enforced values
      max-file-size: 50MB
      max-request-size: 50MB

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0

logging:
  level:
    com.demo.common.web: DEBUG
    org.hibernate.SQL: DEBUG

minio:
  url: http://localhost:9000
  access-key: minio
  secret-key: minio123
  buckets:
    avatars:
      allowed-types:
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
      max-size-bytes: 5242880   # 5 MB
    attachments:
      allowed-types:
        - application/pdf
        - image/jpeg
        - image/png
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
        - text/plain
        - text/csv
      max-size-bytes: 20971520  # 20 MB
