spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  datasource:
    url: jdbc:postgresql://localhost:5432/task_db
    username: task_svc
    password: task_svc_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30     # increased from 20; headroom for write-heavy concurrent load
      minimum-idle: 5
      connection-timeout: 20000 # 20 s — balanced: fail fast vs pool-30 serving 100 VUs each holding connections for multi-op transactions

  flyway:

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

resilience4j:
  circuitbreaker:
    instances:
      userService:
        sliding-window-size: 20             # evaluate over last 20 calls
        minimum-number-of-calls: 20         # don't evaluate until window is full — prevents premature trip on startup burst
        failure-rate-threshold: 50          # open after 50% failures in the window
        wait-duration-in-open-state: 10s    # shorter re-probe window; 30 s was too long under transient load spikes
        permitted-number-of-calls-in-half-open-state: 5  # 5 probes in half-open to confirm recovery under concurrent load

logging:
  level:
    com.demo.task.outbox: DEBUG       # important: outbox publish lifecycle
