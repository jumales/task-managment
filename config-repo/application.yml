# Shared configuration applied to ALL microservices.
# Properties here are merged with each service's own {service-name}.yml.
# Service-specific files win over this file on conflicts.

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/,http://localhost:8762/eureka/}

spring:
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

  security:
    oauth2:
      resourceserver:
        jwt:
          # jwk-set-uri validates the JWT signature via Keycloak's public keys without
          # enforcing the iss claim. issuer-uri would reject tokens whose iss value uses
          # a different hostname than the backend (e.g. 10.0.2.2 from the Android emulator
          # vs localhost used by the backend). Signature validation is sufficient for dev.
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/demo/protocol/openid-connect/certs}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

feign:
  client:
    config:
      default:
        connect-timeout: 2000   # 2 s — fail fast on connection refused
        read-timeout: 5000      # 5 s — prevent thread starvation on slow responses

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,loggers
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0  # 100% in dev; reduce to 0.05-0.1 in prod

logging:
  level:
    com.demo.common.web: DEBUG        # controller param tracing + MDC filter
    org.apache.kafka: WARN
    org.apache.kafka.clients.NetworkClient: ERROR
    org.springframework.kafka: WARN
    org.hibernate: WARN

ttl:
  task:
    archive-after-closed-days: 90    # days after close (RELEASED/REJECTED) before archiving
    archive-retention-months: 12     # months to keep archive tables before dropping
    batch-size: 100                  # max tasks archived per nightly run
  outbox:
    retention-days: 30               # days to keep published outbox_events rows
  task-code-job:
    retention-days: 30               # days to keep processed task_code_jobs rows
  audit:
    archive-retention-months: 24     # months to keep audit archive tables
  notification:
    retention-days: 365              # days to keep notification records
  file:
    deleted-object-retention-days: 30  # days after soft-delete before MinIO object is removed
  kafka:
    task-events-retention-hours: 168   # 7 days
    task-changed-retention-hours: 168  # 7 days
  elasticsearch:
    log-retention-days: 30           # days to retain Logstash indices
