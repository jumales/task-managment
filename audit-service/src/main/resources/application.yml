server:
  port: 0

spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://localhost:5432/audit_db
    username: audit_svc
    password: audit_svc_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000 # 20 s — balanced: fail fast vs allow queued requests to drain
  flyway:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false  # SQL logging is available at DEBUG via logging.level.org.hibernate.SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: audit-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      max-poll-records: 200  # consumer pulls up to 200 records per poll; default 500 can overwhelm slow consumers
      properties:
        spring.json.trusted.packages: "com.demo.common.event"
        spring.json.value.default.type: "com.demo.common.event.TaskChangedEvent"
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/demo}

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/,http://localhost:8762/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,loggers
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0  # 100% sampling in dev; reduce in prod (e.g. 0.1)

logging:
  level:
    com.demo.common.web: DEBUG        # controller param tracing + MDC filter
    org.hibernate.SQL: DEBUG          # SQL statements (replaces show-sql: true)
    com.demo.audit.consumer: DEBUG    # important: app-level event consumption
    org.apache.kafka: WARN
    org.apache.kafka.clients.NetworkClient: ERROR
    org.springframework.kafka.listener: INFO   # DLT routing and retry attempts
    org.springframework.kafka: WARN
    org.hibernate: WARN
