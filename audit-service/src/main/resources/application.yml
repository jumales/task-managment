server:
  port: 0

spring:
  application:
    name: audit-service
  datasource:
    url: jdbc:postgresql://localhost:5432/audit_db
    username: audit_svc
    password: audit_svc_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    baseline-on-migrate: true  # handle pre-existing schema with no flyway_schema_history table

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false  # SQL logging is available at DEBUG via logging.level.org.hibernate.SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: audit-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.demo.common.event"
        spring.json.value.default.type: "com.demo.common.event.TaskChangedEvent"

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/demo

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0  # 100% sampling in dev; reduce in prod (e.g. 0.1)

logging:
  level:
    com.demo.common.web: DEBUG        # controller param tracing + MDC filter
    org.hibernate.SQL: DEBUG          # SQL statements (replaces show-sql: true)
