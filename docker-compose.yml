services:

  postgres:
    build:
      context: ./docker-images/postgres
      dockerfile: Dockerfile
    container_name: ms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ms-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    # No persistent volumes for Zookeeper — persisting ZK session data causes
    # "NodeExists" conflicts when Kafka restarts, because the old ephemeral broker
    # registration lingers until the ZK session timeout expires.
    networks:
      - ms-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ms-kafka
    depends_on:
      - zookeeper
    # Host port mapping (9092:9092) lives in docker-compose.override.yml for local dev only.
    # In CI/staging, only this file is used so Kafka is not exposed to the host.
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # PLAINTEXT_HOST = reachable from host machine (localhost:9092)
      # PLAINTEXT      = reachable inside Docker network (kafka:29092)
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ms-network

  web-client:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    container_name: ms-web-client
    ports:
      - "3000:80"
    networks:
      - ms-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ms-keycloak
    # start-dev + --import-realm imports any JSON found in /opt/keycloak/data/import/
    # on first boot; skipped on subsequent starts if the realm already exists.
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./docker-images/keycloak/demo-realm.json:/opt/keycloak/data/import/demo-realm.json:ro
    networks:
      - ms-network

  # ── ELK Stack ────────────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ms-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # disabled for local dev only
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - ms-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: ms-logstash
    depends_on:
      - elasticsearch
    ports:
      - "5000:5000"    # TCP input — services ship logs here (logstash Spring profile)
      - "9600:9600"    # Logstash monitoring API
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
    networks:
      - ms-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: ms-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - ms-network

  redis:
    image: redis:7-alpine
    container_name: ms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: ms-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ms-mailhog
    ports:
      - "1025:1025"   # SMTP — services send emails here
      - "8025:8025"   # Web UI + REST API for inspecting captured emails
    networks:
      - ms-network

  minio-init:
    image: minio/mc:latest
    container_name: ms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123;
      mc mb local/avatars --ignore-existing;
      mc mb local/attachments --ignore-existing;
      exit 0;
      "
    networks:
      - ms-network

volumes:
  postgres-data:
  keycloak-data:
  elasticsearch-data:
  minio-data:
  kafka-data:

networks:
  ms-network:
    driver: bridge
