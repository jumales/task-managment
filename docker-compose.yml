services:

  postgres:
    build:
      context: ./docker-images/postgres
      dockerfile: Dockerfile
    container_name: ms-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo123
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ms-kafka
    # Host port mapping (9092:9092) lives in docker-compose.override.yml for local dev only.
    # In CI/staging, only this file is used so Kafka is not exposed to the host.
    environment:
      # KRaft mode — no ZooKeeper needed
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # PLAINTEXT_HOST = reachable from host machine (localhost:9092)
      # PLAINTEXT      = reachable inside Docker network (kafka:29092)
      # CONTROLLER     = internal KRaft consensus, not exposed externally
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Fixed cluster ID so the KRaft log dir is formatted consistently across restarts
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qw"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - ms-network

  web-client:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    container_name: ms-web-client
    ports:
      - "3000:80"
    networks:
      - ms-network

  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: ms-keycloak
    # init-keycloak.sh starts Keycloak in dev mode (with realm import), then
    # sets sslRequired=NONE on all realms so HTTP works from remote addresses.
    entrypoint: ["/bin/bash", "/opt/keycloak/init/init-keycloak.sh"]
    ports:
      - "8180:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./docker-images/keycloak/demo-realm.json:/opt/keycloak/data/import/demo-realm.json:ro
      - ./docker-images/keycloak/init-keycloak.sh:/opt/keycloak/init/init-keycloak.sh:ro
    networks:
      - ms-network

  # ── ELK Stack ────────────────────────────────────────────────────────────────

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: ms-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false   # disabled for local dev only
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - ms-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.13.0
    container_name: ms-logstash
    depends_on:
      - elasticsearch
    ports:
      - "5000:5000"    # TCP input — services ship logs here (logstash Spring profile)
      - "9600:9600"    # Logstash monitoring API
    volumes:
      - ./docker/logstash/pipeline:/usr/share/logstash/pipeline:ro
    networks:
      - ms-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    container_name: ms-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - ms-network

  redis:
    image: redis:7-alpine
    container_name: ms-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: ms-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO web console
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ms-network

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ms-mailhog
    ports:
      - "1025:1025"   # SMTP — services send emails here
      - "8025:8025"   # Web UI + REST API for inspecting captured emails
    networks:
      - ms-network

  minio-init:
    image: minio/mc:latest
    container_name: ms-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123;
      mc mb local/avatars --ignore-existing;
      mc mb local/attachments --ignore-existing;
      exit 0;
      "
    networks:
      - ms-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: ms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - ms-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: ms-grafana
    ports:
      - "3001:3000"
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    depends_on:
      - prometheus
    networks:
      - ms-network

volumes:
  postgres-data:
  keycloak-data:
  elasticsearch-data:
  minio-data:
  kafka-data:
  prometheus-data:
  grafana-data:

networks:
  ms-network:
    driver: bridge
