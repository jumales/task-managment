server:
  port: 0

spring:
  application:
    name: user-service

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/demo}
      client:
        registration:
          keycloak:
            client-id: user-service
            client-secret: ${KEYCLOAK_USER_SERVICE_CLIENT_SECRET:user-service-secret}
            authorization-grant-type: client_credentials
            scope: openid
        provider:
          keycloak:
            token-uri: ${KEYCLOAK_TOKEN_URI:http://localhost:8180/realms/demo/protocol/openid-connect/token}

keycloak:
  admin:
    base-url: ${KEYCLOAK_ADMIN_BASE_URL:http://localhost:8180/admin/realms/demo}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0  # 100% sampling in dev; reduce in prod (e.g. 0.1)

logging:
  level:
    com.demo.common.web: DEBUG        # controller param tracing + MDC filter
    com.demo.user.event: DEBUG        # important: app-level kafka publish events
    org.apache.kafka: WARN
    org.springframework.kafka: WARN
    org.hibernate: WARN
