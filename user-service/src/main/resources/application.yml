server:
  port: 0

spring:
  application:
    name: user-service
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: user_svc
    password: user_svc_pass
    driver-class-name: org.postgresql.Driver
  flyway:
    baseline-on-migrate: true  # handle pre-existing schema with no flyway_schema_history table

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false  # SQL logging is available at DEBUG via logging.level.org.hibernate.SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/demo

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0  # 100% sampling in dev; reduce in prod (e.g. 0.1)

logging:
  level:
    com.demo.common.web: DEBUG        # controller param tracing + MDC filter
    org.hibernate.SQL: DEBUG          # SQL statements (replaces show-sql: true)
