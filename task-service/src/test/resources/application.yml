spring:
  main:
    # Allows TestSecurityConfig.taskExecutor() (SyncTaskExecutor) to override
    # AsyncConfig.taskExecutor() so @Async methods run synchronously in tests.
    allow-bean-definition-overriding: true
  cloud:
    config:
      # Disable config server client in tests — no CONFIG_SERVER_URL is available.
      enabled: false

# Enable DEBUG on com.demo so MdcFilterIT / ControllerLoggingAspectIT log lines
# reach the root ListAppender (root defaults to INFO which would drop DEBUG events).
logging:
  level:
    com.demo: DEBUG
