server:
  port: 0

spring:
  application:
    name: task-service
  datasource:
    url: jdbc:postgresql://localhost:5432/task_db
    username: task_svc
    password: task_svc_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20     # max concurrent DB connections (default: 10)
      minimum-idle: 5           # keep warm connections ready at all times
      connection-timeout: 30000 # 30 s — fail fast if pool is exhausted
  flyway:

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false  # SQL logging is available at DEBUG via logging.level.org.hibernate.SQL
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/demo}

feign:
  client:
    config:
      default:
        connect-timeout: 2000   # 2 s — fail fast on connection refused
        read-timeout: 5000      # 5 s — prevent thread starvation on slow responses

resilience4j:
  circuitbreaker:
    instances:
      userService:
        sliding-window-size: 10
        failure-rate-threshold: 50          # open after 50% failures in the window
        wait-duration-in-open-state: 30s    # stay open for 30 s before half-open probe
        permitted-number-of-calls-in-half-open-state: 3

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0  # 100% sampling in dev; reduce in prod (e.g. 0.1)

logging:
  level:
    com.demo.common.web: DEBUG        # controller param tracing + MDC filter
    org.hibernate.SQL: DEBUG          # SQL statements (replaces show-sql: true)
    com.demo.task.outbox: DEBUG       # important: outbox publish lifecycle
    org.apache.kafka: WARN
    org.apache.kafka.clients.NetworkClient: ERROR
    org.springframework.kafka: WARN
    org.hibernate: WARN
