server:
  port: 0

spring:
  application:
    name: search-service

  elasticsearch:
    uris: http://localhost:9200
    connection-timeout: 5s
    socket-timeout: 10s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: search-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      ack-mode: MANUAL_IMMEDIATE

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/demo}

feign:
  client:
    config:
      default:
        connect-timeout: 2000   # 2 s — fail fast on connection refused
        read-timeout: 5000      # 5 s — prevent thread starvation on slow responses

resilience4j:
  circuitbreaker:
    instances:
      searchTaskService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
      searchUserService:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3

eureka:
  instance:
    instance-id: ${spring.application.name}:${random.value}
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/,http://localhost:8762/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info,loggers
  endpoint:
    health:
      show-details: never
  tracing:
    sampling:
      probability: 1.0  # 100% sampling in dev; reduce in prod (e.g. 0.1)

logging:
  level:
    com.demo.common.web: DEBUG        # controller param tracing + MDC filter
    org.springframework.data.elasticsearch: DEBUG
    com.demo.search.consumer: DEBUG   # important: app-level event consumption
    org.apache.kafka: WARN
    org.apache.kafka.clients.NetworkClient: ERROR
    org.springframework.kafka: WARN
    org.hibernate: WARN
