server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          # CONFIG_REPO_PATH is set in Docker (bind-mounted volume); falls back to monorepo root in local mvn runs
          search-locations: file:${CONFIG_REPO_PATH:${user.dir}/config-repo}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
