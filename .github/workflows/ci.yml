name: CI

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Each service runs as an independent parallel job so a single slow service
# cannot block the rest, and Kafka/Elasticsearch IT tests are no longer skipped.

jobs:

  task-service:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Pre-pull images
        run: |
          docker pull postgres:16-alpine
          docker pull confluentinc/cp-kafka:7.6.1
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Test
        run: mvn verify -pl common,task-service --also-make
      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-task-service
          path: task-service/target/surefire-reports/*.txt
          retention-days: 7

  user-service:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Pre-pull images
        run: docker pull postgres:16-alpine
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Test
        run: mvn verify -pl common,user-service --also-make
      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-user-service
          path: user-service/target/surefire-reports/*.txt
          retention-days: 7

  audit-service:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Pre-pull images
        run: |
          docker pull postgres:16-alpine
          docker pull confluentinc/cp-kafka:7.6.1
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Test
        run: mvn verify -pl common,audit-service --also-make
      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-audit-service
          path: audit-service/target/surefire-reports/*.txt
          retention-days: 7

  file-service:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Pre-pull images
        run: |
          docker pull postgres:16-alpine
          docker pull minio/minio:RELEASE.2024-01-18T22-51-28Z
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Test
        run: mvn verify -pl common,file-service --also-make
      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-file-service
          path: file-service/target/surefire-reports/*.txt
          retention-days: 7

  search-service:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Pre-pull images
        run: |
          docker pull confluentinc/cp-kafka:7.6.1
          docker pull docker.elastic.co/elasticsearch/elasticsearch:8.13.0
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Test
        run: mvn verify -pl common,search-service --also-make
      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-search-service
          path: search-service/target/surefire-reports/*.txt
          retention-days: 7

  notification-service:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Pre-pull images
        run: |
          docker pull postgres:16-alpine
          docker pull confluentinc/cp-kafka:7.6.1
          docker pull mailhog/mailhog:v1.0.1
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Test
        run: mvn verify -pl common,notification-service --also-make
      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-notification-service
          path: notification-service/target/surefire-reports/*.txt
          retention-days: 7

  reporting-service:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Pre-pull images
        run: |
          docker pull postgres:16-alpine
          docker pull confluentinc/cp-kafka:7.6.1
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven
      - name: Test
        run: mvn verify -pl common,reporting-service --also-make
      - name: Upload surefire reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reporting-service
          path: reporting-service/target/surefire-reports/*.txt
          retention-days: 7

  # Gate job — branch protection rules can require this single job instead of
  # listing every service job individually.
  ci-passed:
    needs: [ task-service, user-service, audit-service, file-service, search-service, notification-service, reporting-service ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All service jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more service jobs failed or were cancelled."
            exit 1
          fi
          echo "All service jobs passed."
