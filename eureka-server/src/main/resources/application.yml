server:
  port: ${SERVER_PORT:8761}

spring:
  application:
    name: eureka-server

eureka:
  server:
    wait-time-in-ms-when-sync-empty: 0

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,loggers
  endpoint:
    health:
      show-details: never

---
# peer1 — primary node, listens on 8761, replicates to peer2
spring:
  config:
    activate:
      on-profile: peer1
eureka:
  instance:
    hostname: eureka-peer1
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-peer2:8762/eureka/

---
# peer2 — secondary node, listens on 8762, replicates to peer1
spring:
  config:
    activate:
      on-profile: peer2
server:
  port: 8762
eureka:
  instance:
    hostname: eureka-peer2
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://eureka-peer1:8761/eureka/

---
# standalone — default single-node profile for local dev without HA
spring:
  config:
    activate:
      on-profile: "!peer1 & !peer2"
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
