build:
  maxIssues: 0

config:
  validation: true
  warningsAsErrors: false

processors:
  active: true

console-reports:
  active: true

# Rule sets — tune thresholds to match project conventions
complexity:
  active: true
  ComplexMethod:
    active: true
    threshold: 15
  LongMethod:
    active: true
    threshold: 60
  LongParameterList:
    active: true
    functionThreshold: 8
    constructorThreshold: 8
  TooManyFunctions:
    active: false

coroutines:
  active: true
  GlobalCoroutineUsage:
    active: true
  RedundantSuspendModifier:
    active: true

empty-blocks:
  active: true
  EmptyCatchBlock:
    active: true
    allowedExceptionNameRegex: "_|(ignored|expected)"

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: true
    exceptionNames:
      - Error
      - Exception
    allowedExceptionNameRegex: "_|(ignored|expected)"
  TooGenericExceptionThrown:
    active: true

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - "Composable"
      - "Test"
  TopLevelPropertyNaming:
    active: false

style:
  active: true
  MagicNumber:
    active: false
  ReturnCount:
    active: true
    max: 4
  UnusedPrivateMember:
    active: true
  WildcardImport:
    active: true
    excludeImports:
      - "kotlinx.android.synthetic.*"
      - "androidx.compose.material3.*"
